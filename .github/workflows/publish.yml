name: Publish to npm

on:
    push:
        tags:
            - "v*"

permissions:
    id-token: write
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22.14.0"
                  registry-url: "https://registry.npmjs.org"

            - run: corepack enable

            - run: npm install -g npm@11

            - run: corepack yarn install --immutable

            - run: corepack yarn build

            - run: corepack yarn type-check

            - run: corepack yarn test

            - name: Check if version already published
              id: check_version
              run: |
                  PACKAGE_VERSION=$(node -p "require('./package.json').version")
                  if npm view @bitsocial/ai-moderation-challenge@$PACKAGE_VERSION version 2>/dev/null; then
                    echo "Version $PACKAGE_VERSION already exists on npm, skipping publish"
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "Version $PACKAGE_VERSION not found on npm, will publish"
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Publish to npm
              if: steps.check_version.outputs.exists == 'false'
              run: npm publish --access public --provenance
